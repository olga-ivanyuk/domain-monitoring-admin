services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: domain_monitoring_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - domain_monitoring_net

  web:
    image: nginx:1.27-alpine
    container_name: domain_monitoring_web
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - domain_monitoring_net

  db:
    image: mysql:8.4
    container_name: domain_monitoring_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: domain_monitoring_admin
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3308:3306"
    volumes:
      - domain_monitoring_db_data:/var/lib/mysql
    networks:
      - domain_monitoring_net

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: domain_monitoring_queue
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --sleep=1
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - db
    restart: unless-stopped
    networks:
      - domain_monitoring_net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: domain_monitoring_scheduler
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - db
    restart: unless-stopped
    networks:
      - domain_monitoring_net

volumes:
  domain_monitoring_db_data:

networks:
  domain_monitoring_net:
    driver: bridge
